  /* ── Admin ── */
  ['41', 'Administration — El Awael','admin@elawail.ma',          'Admin2024',     '—',                              'Administrateur'],
];

function genererExcel() {
  /* ── Créer le workbook ── */
  const wb = XLSX.utils.book_new();

  /* ── Données avec en-tête ── */
  const wsData = [
    ['N°', 'Nom', 'Email de connexion', 'Mot de passe', 'Classe', 'Rôle'],
    ...COMPTES
  ];

  const ws = XLSX.utils.aoa_to_sheet(wsData);

  /* ── Largeurs de colonnes ── */
  ws['!cols'] = [
    { wch: 5  },   /* N° */
    { wch: 28 },   /* Nom */
    { wch: 32 },   /* Email */
    { wch: 18 },   /* Mot de passe */
    { wch: 30 },   /* Classe */
    { wch: 18 },   /* Rôle */
  ];

  /* ── Style de l'en-tête (remplissage bleu, texte blanc, gras) ── */
  const headerStyle = {
    font:      { bold: true, color: { rgb: 'FFFFFF' }, sz: 12 },
    fill:      { fgColor: { rgb: '1B3A6B' } },
    alignment: { horizontal: 'center', vertical: 'center' },
    border: {
      bottom: { style: 'thin', color: { rgb: 'FFFFFF' } }
    }
  };

  /* Appliquer le style à chaque cellule d'en-tête (ligne 1 = index 0) */
  ['A1','B1','C1','D1','E1','F1'].forEach(ref => {
    if (ws[ref]) ws[ref].s = headerStyle;
  });

  /* ── Style des lignes de données ── */
  COMPTES.forEach((row, rowIdx) => {
    const excelRow = rowIdx + 2; /* +2 car ligne 1 = en-tête */
    const isEven   = rowIdx % 2 === 0;

    /* Couleur de fond alternée */
    const bgColor  = isEven ? 'F8FAFC' : 'FFFFFF';

    /* Colonne Mot de passe (D) → vert */
    const passRef  = `D${excelRow}`;
    if (ws[passRef]) {
      ws[passRef].s = {
        font:      { bold: true, color: { rgb: '059669' }, name: 'Courier New', sz: 11 },
        fill:      { fgColor: { rgb: bgColor } },
        alignment: { horizontal: 'center' }
      };
    }

    /* N° → gris centré */
    const numRef = `A${excelRow}`;
    if (ws[numRef]) {
      ws[numRef].s = {
        font:      { color: { rgb: '94A3B8' } },
        fill:      { fgColor: { rgb: bgColor } },
        alignment: { horizontal: 'center' }
      };
    }

    /* Autres colonnes */
    ['B','C','E','F'].forEach(col => {
      const ref = `${col}${excelRow}`;
      if (ws[ref]) {
        ws[ref].s = {
          fill: { fgColor: { rgb: bgColor } },
          alignment: { horizontal: 'left' }
        };
      }
    });

    /* Ligne Admin → fond rouge pâle */
    if (rowIdx === COMPTES.length - 1) {
      ['A','B','C','D','E','F'].forEach(col => {
        const ref = `${col}${excelRow}`;
        if (ws[ref]) {
          ws[ref].s = Object.assign({}, ws[ref].s || {}, {
            fill: { fgColor: { rgb: 'FFF1F2' } },
            font: Object.assign({}, (ws[ref].s || {}).font || {}, { bold: true })
          });
        }
      });
    }
  });

  /* ── Hauteur des lignes ── */
  ws['!rows'] = [
    { hpt: 22 }, /* en-tête */
    ...COMPTES.map(() => ({ hpt: 18 }))
  ];

  /* ── Ajouter la feuille au workbook ── */
  XLSX.utils.book_append_sheet(wb, ws, 'Comptes ElAwail');

  /* ── Feuille 2 : résumé par classe ── */
  const classes = {};
  COMPTES.forEach(([n, nom, email, pass, classe, role]) => {
    if (role === 'Administrateur') return;
    if (!classes[classe]) classes[classe] = [];
    classes[classe].push([nom, email, pass]);
  });

  const resumeData = [['Classe', 'Nombre de cadres']];
  Object.entries(classes).forEach(([cl, members]) => {
    resumeData.push([cl, members.length]);
  });
  resumeData.push(['', '']);
  resumeData.push(['TOTAL CADRES', COMPTES.length - 1]);
  resumeData.push(['TOTAL COMPTES', COMPTES.length]);

  const wsResume = XLSX.utils.aoa_to_sheet(resumeData);
  wsResume['!cols'] = [{ wch: 32 }, { wch: 18 }];

  /* Style en-tête résumé */
  ['A1','B1'].forEach(ref => {
    if (wsResume[ref]) {
      wsResume[ref].s = {
        font: { bold: true, color: { rgb: 'FFFFFF' } },
        fill: { fgColor: { rgb: '1B3A6B' } },
        alignment: { horizontal: 'center' }
      };
    }
  });

  XLSX.utils.book_append_sheet(wb, wsResume, 'Résumé par classe');

  /* ── Télécharger le fichier ── */
  const date = new Date();
  const dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  XLSX.writeFile(wb, `Comptes_ElAwail_${dateStr}.xlsx`);
}

/* ── Lancer automatiquement à l'ouverture ── */
window.addEventListener('load', () => {
  setTimeout(genererExcel, 500);
});
